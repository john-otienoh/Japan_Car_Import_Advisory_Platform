*{box-sizing:border-box;margin:0;padding:0}

let state = {};

function storageKey(){return'jk_checklist_v1'}
function load(){try{const s=localStorage.getItem(storageKey());if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem(storageKey(),JSON.stringify(state));}catch(e){}}

function taskKey(di,si,ti){return`${di}_${si}_${ti}`}
function delivKey(di,i){return`${di}_d_${i}`}

function updateDayProgress(di){
  const d=data[di];
  let total=0,done=0;
  d.sections.forEach((sec,si)=>{sec.tasks.forEach((_,ti)=>{total++;if(state[taskKey(di,si,ti)])done++;})});
  d.deliverables.forEach((_,i)=>{total++;if(state[delivKey(di,i)])done++;});
  const pct=total?Math.round(done/total*100):0;
  const pill=document.getElementById(`pill_${di}`);
  const fill=document.getElementById(`fill_${di}`);
  if(pill){pill.textContent=`${done}/${total}`;pill.className='day-progress-pill'+(pct===100?' done':'');}
  if(fill){fill.style.width=pct+'%';fill.style.background=data[di].color;}
  updateOverall();
}

function updateOverall(){
  let total=0,done=0;
  data.forEach((d,di)=>{
    d.sections.forEach((sec,si)=>sec.tasks.forEach((_,ti)=>{total++;if(state[taskKey(di,si,ti)])done++;}));
    d.deliverables.forEach((_,i)=>{total++;if(state[delivKey(di,i)])done++;});
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overall-pct').textContent=pct+'%';
  document.getElementById('overall-fill').style.width=pct+'%';
}

function toggleTask(di,si,ti){
  const k=taskKey(di,si,ti);
  state[k]=!state[k];
  save();
  const cb=document.getElementById('cb_'+k);
  const txt=document.getElementById('txt_'+k);
  if(cb)cb.className='cb'+(state[k]?' checked':'');
  if(txt)txt.className='task-main'+(state[k]?' done':'');
  updateDayProgress(di);
}

function toggleDeliv(di,i){
  const k=delivKey(di,i);
  state[k]=!state[k];
  save();
  const cb=document.getElementById('dcb_'+k);
  const txt=document.getElementById('dtxt_'+k);
  if(cb)cb.className='db-cb'+(state[k]?' checked':'');
  if(txt)txt.className='db-text'+(state[k]?' done':'');
  updateDayProgress(di);
}

function resetAll(){
  state={};save();
  document.querySelectorAll('.cb').forEach(el=>el.className='cb');
  document.querySelectorAll('.task-main').forEach(el=>el.className='task-main');
  document.querySelectorAll('.db-cb').forEach(el=>el.className='db-cb');
  document.querySelectorAll('.db-text').forEach(el=>el.className='db-text');
  data.forEach((_,di)=>updateDayProgress(di));
}

function toggleDay(di){
  const block=document.getElementById('block_'+di);
  block.classList.toggle('collapsed');
}

load();

const cl=document.getElementById('checklist');
data.forEach((d,di)=>{
  const block=document.createElement('div');
  block.className='day-block'+(di>0?' collapsed':'');
  block.id='block_'+di;

  let html=`
    <div class="day-head" onclick="toggleDay(${di})">
      <div class="day-dot" style="background:${d.color}"></div>
      <div class="day-num">${d.day}</div>
      <div class="day-phase">${d.phase}</div>
      <div class="day-progress-pill" id="pill_${di}">0/0</div>
      <i class="ti ti-chevron-down chevron-icon" aria-hidden="true"></i>
    </div>
    <div class="day-body">
      <div class="day-mini-bar"><div class="day-mini-fill" id="fill_${di}" style="width:0%;background:${d.color}"></div></div>`;

  d.sections.forEach((sec,si)=>{
    html+=`<div class="section-label">${sec.label}</div>`;
    sec.tasks.forEach((task,ti)=>{
      const k=taskKey(di,si,ti);
      const chk=state[k];
      html+=`
        <div class="task-row" onclick="toggleTask(${di},${si},${ti})">
          <div class="cb${chk?' checked':''}" id="cb_${k}"></div>
          <div class="task-content">
            <div class="task-main${chk?' done':''}" id="txt_${k}">${task.t}</div>
            <div class="task-sub">${task.s}</div>
          </div>
        </div>`;
    });
  });

  html+=`<div class="section-label" style="color:var(--color-text-info)">Deliverables — ship before midnight</div>`;
  d.deliverables.forEach((deliv,i)=>{
    const k=delivKey(di,i);
    const chk=state[k];
    html+=`
      <div class="deliverable-row" onclick="toggleDeliv(${di},${i})">
        <div class="db-cb${chk?' checked':''}" id="dcb_${k}"></div>
        <div class="db-text${chk?' done':''}" id="dtxt_${k}">${deliv}</div>
      </div>`;
  });

  html+=`</div>`;
  block.innerHTML=html;
  cl.appendChild(block);
  updateDayProgress(di);
});
</script>
